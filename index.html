<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roter Milan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Language Toggle -->
<div id="lang-toggle">
    <button onclick="setLanguage('en')">English</button>
    <button onclick="setLanguage('de')">Deutsch</button>
</div>

<!-- Header -->
<header>
    <h1 data-en="Roter Milan" data-de="Roter Milan"></h1>
    <p data-en="Authentic Western cuisine in Halle" data-de="Authentische westliche Küche in Halle"></p>
    <p data-en="⭐ 4.6 / 5 (1,395 reviews)" data-de="⭐ 4,6 / 5 (1.395 Bewertungen)"></p>
    <a href="#reservation" class="btn" data-en="Reserve a Table" data-de="Tisch reservieren"></a>
</header>

<!-- Menu -->
<section id="menu">
    <h2 data-en="Our Menu" data-de="Unsere Speisekarte"></h2>
    <div class="menu-category">
        <h3 data-en="Starters" data-de="Vorspeisen"></h3>
        <ul>
            <li data-en="Tomato Soup – €7" data-de="Tomatensuppe – 7€"></li>
            <li data-en="Garlic Bread – €6" data-de="Knoblauchbrot – 6€"></li>
        </ul>
    </div>
    <div class="menu-category">
        <h3 data-en="Main Dishes" data-de="Hauptgerichte"></h3>
        <ul>
            <li data-en="Grilled Steak – €28" data-de="Gegrilltes Steak – 28€"></li>
            <li data-en="Pasta Alfredo – €18" data-de="Pasta Alfredo – 18€"></li>
        </ul>
    </div>
    <div class="menu-category">
        <h3 data-en="Desserts" data-de="Desserts"></h3>
        <ul>
            <li data-en="Cheesecake – €8" data-de="Käsekuchen – 8€"></li>
        </ul>
    </div>
</section>

<!-- Reservation -->
<section id="reservation">
    <h2 data-en="Reserve a Table" data-de="Tisch reservieren"></h2>
    <p data-en="Fill out the form below to book your table:" data-de="Füllen Sie das Formular unten aus, um Ihren Tisch zu reservieren:"></p>
    <!-- Google Form iframe -->
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfPmu7Ltg026rs5UgtRGMndeIGKQns3cHNrfCXgjEs3pKse4A/viewform?embedded=true" width="100%" height="1465" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
</section>

<!-- Reviews -->
<section id="reviews">
    <h2 data-en="Customer Reviews" data-de="Kundenbewertungen"></h2>
    <div class="review">
        <p data-en="Fantastic food and cozy atmosphere. – Tracy S." data-de="Fantastisches Essen und gemütliche Atmosphäre. – Tracy S."></p>
    </div>
    <div class="review">
        <p data-en="Great service and delicious steak. – Mario B." data-de="Toller Service und köstliches Steak. – Mario B."></p>
    </div>
</section>

<!-- Contact -->
<section id="contact">
    <h2 data-en="Contact" data-de="Kontakt"></h2>
    <p data-en="📍 Böllberger Weg 130, 06128 Halle (Saale)" data-de="📍 Böllberger Weg 130, 06128 Halle (Saale)"></p>
    <p data-en="📞 01512 1591338" data-de="📞 01512 1591338"></p>
    <p data-en="🕒 Opens 5 PM" data-de="🕒 Öffnet 17:00"></p>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2431.905095951849!2d11.949788076321554!3d51.46589537961762!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47a750d07d0f5f83%3A0x38a11fcdca3e5aa1!2sB%C3%B6llberger%20Weg%20130%2C%2006128%20Halle%20(Saale)%2C%20Germany!5e0!3m2!1sen!2sus!4v1707099650000!5m2!1sen!2sus" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</section>

<script src="script.js"></script>
</body>
</html>
